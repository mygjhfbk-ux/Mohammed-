workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - diuoni_keystore
      vars:
        SUPABASE_URL: Encrypted(...)
        SUPABASE_ANON_KEY: Encrypted(...)

    scripts:
      - name: Set up Flutter SDK
        script: |
          flutter --version
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

    artifacts:
      - build/app/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - dev@diuoni.app
        notify:
          success: true
          failure: true
